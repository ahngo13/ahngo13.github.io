<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0fdf4"/>
      <stop offset="50%" stop-color="#ecfdf5"/>
      <stop offset="100%" stop-color="#d1fae5"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Decorative circles (top right) -->
  <circle cx="1080" cy="120" r="110" fill="#059669" opacity="0.08"/>
  <circle cx="1140" cy="200" r="60" fill="#059669" opacity="0.12"/>
  <circle cx="1020" cy="230" r="30" fill="#10b981" opacity="0.15"/>

  <!-- Left accent bar -->
  <rect x="0" y="0" width="12" height="630" fill="url(#accent)"/>

  <!-- Main title -->
  <text x="80" y="240" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif" font-size="64" font-weight="800" fill="#064e3b">Aiden Ahn의</text>
  <text x="80" y="325" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif" font-size="84" font-weight="800" fill="url(#accent)">앱 개발 블로그</text>

  <!-- Subtitle -->
  <text x="80" y="395" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif" font-size="30" font-weight="400" fill="#065f46">Play Store에 출시한 앱들의 소식과 후기</text>

  <!-- Divider line -->
  <line x1="80" y1="480" x2="280" y2="480" stroke="#10b981" stroke-width="4" stroke-linecap="round"/>

  <!-- Bottom meta -->
  <text x="80" y="540" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif" font-size="26" font-weight="600" fill="#047857">ahngo13.github.io</text>
  <text x="80" y="580" font-family="-apple-system, BlinkMacSystemFont, 'Apple SD Gothic Neo', system-ui, sans-serif" font-size="20" font-weight="400" fill="#047857" opacity="0.75">Android apps · Dev notes · Release logs</text>

  <!-- Code-style accent (right side) -->
  <g transform="translate(920, 380)" stroke="#059669" stroke-width="6" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.45">
    <!-- &lt; -->
    <polyline points="0,0 -40,40 0,80"/>
    <!-- / -->
    <line x1="30" y1="-10" x2="50" y2="90"/>
    <!-- &gt; -->
    <polyline points="80,0 120,40 80,80"/>
  </g>
</svg>
